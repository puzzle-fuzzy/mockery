services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mockery
      POSTGRES_PASSWORD: mockery
      POSTGRES_DB: mockery
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mockery"]
      interval: 2s
      timeout: 2s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
